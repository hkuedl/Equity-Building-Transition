schema_version: '0.6'
os_version: 3.9.0
os_sha: c77fbb9569
buildstock_directory: ..
project_directory: project_inequity # Relative to buildstock_directory
output_directory: ../Data_output/buildbatch_output
weather_files_path: ../data/weather.zip
# Baseline number of units
baseline:
  n_buildings_represented: 139647020 # American Community Survey 2021 5-year, B25001, does not include territories

# Sampler type and number of data points per baseline or upgrade
sampler:

  type: precomputed # For production run
  args:
    sample_file: buildstock_ready_final.csv


# Workflow generator
workflow_generator:
  # ResStock HPXML workflow generator
  type: residential_hpxml
  version: 2025.04.29

  args:
    # Annual simulation and timestep

    build_existing_model:
      simulation_control_timestep: 15
      simulation_control_run_period_begin_month: 1
      simulation_control_run_period_begin_day_of_month: 1
      simulation_control_run_period_end_month: 12
      simulation_control_run_period_end_day_of_month: 31
      simulation_control_run_period_calendar_year: 2018
      add_component_loads: false

    measures:
      - measure_dir_name: HybridIslandingControl
        arguments:
          outage_mode: true
          ssp_scenario: ssp245
          scenario_year: 2020s
          fail_if_no_outage_in_runperiod: false
          missing_der_behavior: fail
          debug_force_outage_start_hour: 0
          debug_force_outage_duration_hours: 0


    # Outputs to include
    simulation_output_report:
      timeseries_frequency: hourly
      include_timeseries_total_consumptions: true
      include_timeseries_fuel_consumptions: true
      include_timeseries_end_use_consumptions: true


      include_timeseries_zone_temperatures: true


      #   - name: People Sensible Heating Rate
      #   - name: People Total Heating Rate
      #   - name: Site Outdoor Air Humidity Ratio

    model_measures:
      - measure_dir_name: AddEnvelopeSummaryReport

    # Other reporting measures to run
    reporting_measures:
      - measure_dir_name: QOIReport
      - measure_dir_name: ServerDirectoryCleanup # tack this on so we can save some disk space (when using debug: true)

    # Files to keep
    server_directory_cleanup:
      retain_in_idf: false
      retain_schedules_csv: false
      retain_in_osm: false

    debug: false


references:
######## ROOF UPGRADE ############################################################


  # --- Ceiling ---
  # REMDB basis: Unfinished Attic (Ceiling) | Loose Fill | retrofit-mid
  # Installed cost = 1.81 * (0.02 * R + 0.14) = 0.0362 * R + 0.2534 ($/ft^2)
  s1_ceil_to_r13: &s1_ceil_to_r13
    option: Insulation Ceiling|R-13
    apply_logic:
      - or:
        - Geometry Attic Type|Vented Attic
        - Geometry Attic Type|Unvented Attic
      - or:
        - Insulation Ceiling|Uninsulated
        - Insulation Ceiling|R-7
    costs: &cost_attic_ceiling_loosefill_mid_retrofit
      - value: 0.0362
        multiplier: Floor Area, Attic * Insulation Increase (ft^2 * Delta R-value)
      - value: 0.2534
        multiplier: Floor Area, Attic (ft^2)

  s1_ceil_to_r19: &s1_ceil_to_r19
    option: Insulation Ceiling|R-19
    apply_logic:
      - or:
        - Geometry Attic Type|Vented Attic
        - Geometry Attic Type|Unvented Attic
      - Insulation Ceiling|R-13
    costs: *cost_attic_ceiling_loosefill_mid_retrofit

  s1_ceil_to_r30: &s1_ceil_to_r30
